[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
cbor_metadata = false
bytecode_hash = "none"
fs_permissions = [{ access = "read", path = "src" }]

# Remappings loaded from remappings.txt

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
